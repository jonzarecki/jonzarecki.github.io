---
layout: default
---
<article>
  <h1>{{ page.title }}</h1>
  <div class="post-meta">
    {{ page.date | date: "%B %-d, %Y" }} &middot; {% assign words = content | strip_html | number_of_words %}{{ words | divided_by: 220 | at_least: 1 }} min read
  </div>

  {{ content }}

  {% if page.tags.size > 0 %}
  <div class="post-tags">
    {% for tag in page.tags %}<span class="tag">{{ tag }}</span>{% endfor %}
  </div>
  {% endif %}
</article>
